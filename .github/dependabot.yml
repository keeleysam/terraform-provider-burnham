version: 2
# Every merge to main auto-releases a patch version (see .github/workflows/dependabot-auto-release.yml),
# and Dependabot PRs squash-merge automatically once CI is green, so each merged PR is exactly one release.
# To hold that to one release per run, all three ecosystems feed a single multi-ecosystem group ("all"):
# gomod, cargo, and github-actions bumps collapse into ONE pull request, which squash-merges as ONE commit.
# `allow: dependency-type all` on the module ecosystems pulls in indirect deps too, not just direct ones.
# There is no update-types filter, so majors ride in the same PR as minor and patch bumps. The cooldown
# below holds a freshly released version back (7 days for majors, 3 otherwise) so a bad or yanked release
# has time to surface before it auto-merges. Security updates are a separate Dependabot stream: they arrive
# as their own PR, ignore the cooldown, and are not folded into this group, since an ecosystem can only
# belong to one multi-ecosystem group.

multi-ecosystem-groups:
  all:
    schedule:
      interval: "daily"

updates:
  # Go modules: direct and indirect (wazero, the wasm bridges, golang.org/x/*, grpc, prometheus, ...).
  - package-ecosystem: "gomod"
    directory: "/"
    multi-ecosystem-group: "all"
    patterns: ["*"]
    allow:
      - dependency-type: "all"
    cooldown:
      default-days: 3
      semver-major-days: 7

  # Rust crates behind every wasm engine (resvg/usvg/tiny-skia/fontdb, fancy-regex, ...). Each engine keeps
  # its Cargo.toml/Cargo.lock in a `rust/` subdirectory under its package, so this glob picks all of them up
  # at any nesting depth and never needs editing when a new wasm family lands. `dependency-type all` also
  # covers the transitive crates recorded in each Cargo.lock.
  - package-ecosystem: "cargo"
    directories:
      - "/internal/provider/**/rust"
    multi-ecosystem-group: "all"
    patterns: ["*"]
    allow:
      - dependency-type: "all"
    cooldown:
      default-days: 3
      semver-major-days: 7

  # GitHub Actions (dtolnay/rust-toolchain, Swatinem/rust-cache, goreleaser-action, checkout/setup-go/cache).
  # The Rust toolchain itself is pinned to `@stable` in the workflows and self-updates, so this only tracks
  # the action versions.
  - package-ecosystem: "github-actions"
    directory: "/"
    multi-ecosystem-group: "all"
    patterns: ["*"]
    cooldown:
      default-days: 3
