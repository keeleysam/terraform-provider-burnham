version: 2
updates:
  # Go modules: wazero, golang.org/x/image (Go text font), and everything else.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
  # Rust crates behind every wasm engine: the SVG renderer (resvg, usvg, tiny-skia, fontdb), the
  # PCRE regex engine (fancy-regex, serde_json), and any future one. Each engine keeps its
  # Cargo.toml/Cargo.lock in a `rust/` subdirectory under its package, so this glob picks all of
  # them up at any nesting depth (`image/resvg/rust`, `regex/rust`, ...) and the list never needs
  # editing when a new wasm family lands. CI rebuilds the wasm from these with --locked, and each
  # family's tests (the renderer's golden-hash tests, the regex unit tests) gate any behavior change.
  - package-ecosystem: "cargo"
    directories:
      - "/internal/provider/**/rust"
    schedule:
      interval: "daily"
  # Actions, including the Rust toolchain and cache actions (dtolnay/rust-toolchain,
  # Swatinem/rust-cache) and goreleaser-action. The toolchain itself is pinned to
  # `@stable` in the workflows, which always resolves to the latest stable Rust, so
  # it self-updates; there is no rust-toolchain.toml to bump (Dependabot has no
  # updater for that file anyway). This entry keeps the action versions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
