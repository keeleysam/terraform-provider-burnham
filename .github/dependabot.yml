version: 2
# Grouping: every merge to main auto-releases a new patch version, and dependabot PRs auto-merge once
# CI is green, so ungrouped updates would produce a release per bump. Each ecosystem groups its
# minor+patch updates into a single PR (so a day's routine bumps become one merge, one release), while
# major updates stay as individual PRs since they are likelier to break and deserve their own review.
updates:
  # Go modules: wazero, golang.org/x/image (Go text font), and everything else.
  # allow dependency-type "all" so indirect (`// indirect`) deps are eligible too.
  # Dependabot version updates default to direct-only, which left ~86 indirect
  # modules (golang.org/x/net, x/tools, google.golang.org/grpc, prometheus/client_golang, ...)
  # never bumped on their own; with "all" they flow into the group below like any direct bump.
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-type: "all"
    groups:
      go-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  # Rust crates behind every wasm engine: the SVG renderer (resvg, usvg, tiny-skia, fontdb), the
  # PCRE regex engine (fancy-regex, serde_json), and any future one. Each engine keeps its
  # Cargo.toml/Cargo.lock in a `rust/` subdirectory under its package, so this glob picks all of
  # them up at any nesting depth (`image/resvg/rust`, `regex/rust`, ...) and the list never needs
  # editing when a new wasm family lands. CI rebuilds the wasm from these with --locked, and each
  # family's tests (the renderer's golden-hash tests, the regex unit tests) gate any behavior change.
  - package-ecosystem: "cargo"
    directories:
      - "/internal/provider/**/rust"
    schedule:
      interval: "daily"
    # allow "all" here too: cargo defaults to direct-only, so transitive crates in
    # each Cargo.lock (the deps of resvg/usvg/fancy-regex/... ) would otherwise never bump.
    allow:
      - dependency-type: "all"
    groups:
      rust-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
  # Actions, including the Rust toolchain and cache actions (dtolnay/rust-toolchain,
  # Swatinem/rust-cache) and goreleaser-action. The toolchain itself is pinned to
  # `@stable` in the workflows, which always resolves to the latest stable Rust, so
  # it self-updates; there is no rust-toolchain.toml to bump (Dependabot has no
  # updater for that file anyway). This entry keeps the action versions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
