name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

# Four parallel jobs:
#   - build:      `go build ./...` + `go vet ./...`. Fast-fail for the common "I broke compilation" case so contributors don't wait the full ~3-5 min `test` cycle to see a missing-import error.
#   - test:       build, vet, the full TF_ACC=1 acceptance suite, coverage. Repeats the build/vet for self-containment so this job is also runnable in isolation.
#   - generate:   regenerate docs/ and pi_packed.bin, fail if either drifts.
#   - goreleaser: `goreleaser build --snapshot --single-target` to exercise the release path (config parse, the `before` hooks that build the wasm engines, the go:embed, the binary build) on every branch push. Release.yml only runs on a `v*` tag, so without this a release-only break (a bad .goreleaser.yml, a missing wasm toolchain step, an embed that isn't generated in time) stays invisible until you cut a tag. This surfaces it here instead. `--single-target` builds only the runner's platform: the binary is CGO-free pure Go so per-platform cross-compilation effectively never breaks on its own, and the full goos/goarch matrix is still validated at release time.
# The Chudnovsky regen for pi_packed.bin takes ~80s on Actions runners — splitting it off keeps the generate-drift feedback loop separate from the acceptance pass.
# `-race` is intentionally not enabled here. On `ubuntu-latest` (2-core) runners with the per-test Terraform-subprocess overhead, race-detector wall time blew through Go's default 10-minute per-binary `-timeout`. The provider's real concurrency surface is tiny (slugify's mutex around gosimple/slug's package globals is essentially the whole story) and is well-covered by local dev runs. Add a separate periodic race-detector job if regression risk becomes a concern.
#
# The SVG renderer (internal/provider/image) go:embeds a wasm blob and an emoji
# font that are gitignored and produced by `go generate` (a Rust->wasm build via
# cargo, plus a pinned font download). Nothing that compiles the image package
# will build until those exist, so every job installs the Rust toolchain and runs
# the image generate step first. Swatinem/rust-cache keeps the cargo build warm across runs so this is cheap after the first build.
# All three wasm crates (regex, image/resvg, documents/typst) are cached under the shared-key "wasm". release.yml consumes that same key, and GitHub exposes default-branch caches to tag-triggered runs, so a tagged release restores these warm target/ dirs instead of paying the ~5min cold cargo build that dominates a release. save-if scopes writes to main (the cache tagged releases read) and staging (so this can be iterated on without pushing to main); every other feature branch and PR restores those caches read-only rather than churning the 10GB quota with per-branch copies. The workspace list and shared-key MUST stay identical to release.yml or the keys stop matching and releases fall back to cold builds.
# The pinned Noto fonts (gitignored) are cached separately, keyed on genfonts.go. genfonts is idempotent: it hashes each on-disk font against the pinned sha256 and skips the download when they match, so a cache hit avoids the network entirely. Bumping a font version in genfonts.go changes both the checksum and the cache key, forcing a fresh download.
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            internal/provider/regex/rust
            internal/provider/image/resvg/rust
            internal/provider/documents/typst/rust
          shared-key: wasm
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' }}
      - uses: actions/cache@v4
        with:
          path: internal/provider/image/fonts
          key: fonts-${{ runner.os }}-${{ hashFiles('internal/provider/image/genfonts.go') }}
      - run: go mod download
      - name: Build render wasm + fetch emoji font (go generate)
        run: go generate ./internal/provider/image/... ./internal/provider/regex/... ./internal/provider/documents/...
      - run: go build ./...
      - run: go vet ./...

  test:
    runs-on: ubuntu-latest
    # Recent runs land near the old 10-min ceiling (record 9:57); pad for the added wasm build.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            internal/provider/regex/rust
            internal/provider/image/resvg/rust
            internal/provider/documents/typst/rust
          shared-key: wasm
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' }}
      - uses: actions/cache@v4
        with:
          path: internal/provider/image/fonts
          key: fonts-${{ runner.os }}-${{ hashFiles('internal/provider/image/genfonts.go') }}
      # Pre-install the Terraform CLI so terraform-plugin-testing's plugintest helper doesn't have to. The runner has no terraform out of the box, so without this every test invocation routes through `hc-install` which writes the binary to a per-process tempdir and execs it. Under `t.Parallel()` in the acceptance suite, many goroutines hit that install path nearly simultaneously and race on the file-write→exec sequence — Linux returns ETXTBSY ("text file busy") because the writable fd hasn't been closed by the time a sibling tries to `fork/exec` the same path. Pre-installing avoids the write entirely; the `TF_ACC_TERRAFORM_PATH` env var below tells plugintest to use the installed binary directly.
      - uses: hashicorp/setup-terraform@v4
        id: setup-terraform
        with:
          terraform_wrapper: false # The wrapper intercepts `terraform version` output and breaks plugintest's version probe.
      - run: go mod download
      - name: Build render wasm + fetch emoji font (go generate)
        run: go generate ./internal/provider/image/... ./internal/provider/regex/... ./internal/provider/documents/...
      - run: go build ./...
      - run: go vet ./...
      # `-coverpkg=./internal/...` captures cross-package coverage. The acceptance tests live in package provider but exercise package dataformat and package network through the protocol layer; without -coverpkg, that work doesn't count toward those packages and the per-package numbers look much worse than they actually are. We then write all per-package profiles into one merged file and report a single combined coverage figure, which is the number worth tracking.
      # `TF_ACC=1` opts in to running the `TestAcc_*` acceptance tests (terraform-plugin-testing skips them by default — without this every TestAcc_* call is a no-op). `-p 1` runs test *packages* serially — the long pole is `internal/provider` (~100s; everything else is <3s), and serialising avoids the parallel-package contention that surprised us on Actions runners. Within `internal/provider` the TestAcc_* helpers call `t.Parallel()` so all acceptance tests run concurrently up to GOMAXPROCS (= the runner's core count).
      - run: go test ./... -count=1 -p 1 -coverpkg=./internal/... -coverprofile=coverage.out
        env:
          TF_ACC: "1"
          TF_ACC_TERRAFORM_PATH: ${{ steps.setup-terraform.outputs.terraform-path }}
      - name: Combined coverage across all internal packages
        run: go tool cover -func=coverage.out | tail -1

  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            internal/provider/regex/rust
            internal/provider/image/resvg/rust
            internal/provider/documents/typst/rust
          shared-key: wasm
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' }}
      - uses: actions/cache@v4
        with:
          path: internal/provider/image/fonts
          key: fonts-${{ runner.os }}-${{ hashFiles('internal/provider/image/genfonts.go') }}
      # tfplugindocs (called from `go generate ./...` below) needs `terraform` on PATH to extract the provider schema via `terraform providers schema -json`. Without a pre-installed binary it falls back to `hc-install` and downloads the latest version every run — an extra ~5-10s of network work plus a possible flake source. Pre-installing pins the version and skips the download.
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_wrapper: false # tfplugindocs parses raw `terraform version` output; the wrapper's prefixing would break that.
      - run: go mod download
      # tfplugindocs (below) builds the provider to extract its schema, and the
      # provider go:embeds the SVG renderer wasm + emoji font, so those must exist
      # before the docs generation runs.
      - name: Build render wasm + fetch emoji font (go generate)
        run: go generate ./internal/provider/image/... ./internal/provider/regex/... ./internal/provider/documents/...
      # Guard: every example is the verbatim source for its doc's "Example Usage" block (tfplugindocs embeds it via `tffile`), so an unformatted example renders badly on the registry. This is the only thing enforcing canonical `terraform fmt` on the examples tree.
      - name: Verify examples are terraform fmt clean
        run: terraform fmt -check -recursive examples/
      # Guard: docs must be up-to-date with their sources. `go generate .` runs the root main.go directives (gendoctemplates, then tfplugindocs) which regenerate docs/ from the built provider. The provider builds against the committed pi_packed.bin and the wasm/fonts generated just above. pi_packed.bin drift is checked separately by the pi-drift job so its ~80s Chudnovsky recompute stays off this critical path; the wasm and fonts are gitignored (built fresh here, never committed) so they are not drift-checked.
      - name: Verify docs are up to date
        run: |
          go generate .
          if ! git diff --quiet -- docs/; then
            echo "::error::Generated docs are out of sync with source. Run 'go generate .' and commit the result."
            git diff -- docs/
            exit 1
          fi

  goreleaser:
    # Skipped on main/staging: warm-build-cache already runs goreleaser with the full matrix there (which includes this single target), so this would be a redundant build. It still runs on PRs and other branches, where the warmer is gated off, to keep the release path smoke-tested.
    if: github.ref != 'refs/heads/main' && github.ref != 'refs/heads/staging'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # goreleaser reads tags/history to compute the snapshot version.
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            internal/provider/regex/rust
            internal/provider/image/resvg/rust
            internal/provider/documents/typst/rust
          shared-key: wasm
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' }}
      - uses: actions/cache@v4
        with:
          path: internal/provider/image/fonts
          key: fonts-${{ runner.os }}-${{ hashFiles('internal/provider/image/genfonts.go') }}
      # `build --snapshot` runs the real `before` hooks (go mod tidy, then `go generate ./internal/provider/...` which builds the wasm engines and fetches the fonts), then compiles the provider, so this is the same path a tagged release takes minus signing and publishing. `--single-target` limits the compile to the runner's platform to keep the job fast; the full matrix runs at release time. No GITHUB_TOKEN or GPG key: a snapshot build neither publishes a release nor signs artifacts.
      - uses: goreleaser/goreleaser-action@v7
        with:
          args: build --snapshot --single-target --clean

  # Best-effort warmer for the release build cache. A tagged release only recompiles what changed if the Go build cache is already warm for every target architecture, so the ~9min cold cross-compile at release time collapses to a link-only pass. GitHub exposes default-branch caches to tag-triggered runs, so warming here on each push to main leaves an all-architecture GOCACHE ready for the next release to restore.
  # This job is purely additive and must never hurt: continue-on-error means a warm failure can never fail CI, and it runs in parallel with the real test jobs so it adds nothing to wall-clock. It runs on main (which warms the production cache a tagged release reads) and on staging (so this can be exercised without pushing to main, where every push auto-tags and releases); it is skipped on other branches and PRs to avoid churning the 10GB cache quota. Note a staging-scoped cache does not speed real releases, only main's does, so staging is purely for validating the job.
  # Rust ordering (no chicken-and-egg): the all-arch Go build needs the wasm blobs the provider go:embeds, and those come from cargo. Using `goreleaser build --snapshot` guarantees the order for free, its `before` hooks build the wasm engines (via the shared "wasm" rust-cache) before it compiles any Go, and it uses the exact release build flags so the cache it warms is actually hit at release time. The wasm itself is cached by the rust-cache above; this job persists the Go build cache.
  # setup-go's cache is disabled here on purpose: its key is go.sum-based and shared with the single-target jobs, so whichever finishes first would clobber this job's full-matrix GOCACHE. A dedicated actions/cache key keeps the all-arch cache intact. Consuming it in release.yml is a separate follow-up.
  warm-build-cache:
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # goreleaser reads tags/history to compute the snapshot version.
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
          cache: false
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            internal/provider/regex/rust
            internal/provider/image/resvg/rust
            internal/provider/documents/typst/rust
          shared-key: wasm
          save-if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging' }}
      - uses: actions/cache@v4
        with:
          path: internal/provider/image/fonts
          key: fonts-${{ runner.os }}-${{ hashFiles('internal/provider/image/genfonts.go') }}
      # Key includes the commit SHA so every push saves a fresh cache: actions/cache keys are immutable, so a go.sum-only key would freeze the GOCACHE at the first commit for that go.sum and let the provider's own packages go stale (deps would stay warm, but our code would recompile from scratch every release). restore-keys fall back to the most recent same-go.sum cache (then any), so each run restores incrementally rather than cold. release.yml restores by the same SHA (its tag points at this commit), so it gets this exact commit's cache.
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-allarch-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-${{ github.sha }}
          restore-keys: |
            go-allarch-${{ runner.os }}-${{ hashFiles('**/go.sum') }}-
            go-allarch-${{ runner.os }}-
      - name: Warm all-arch Go build cache (full matrix, no publish/sign)
        uses: goreleaser/goreleaser-action@v7
        with:
          args: build --snapshot --clean

  # pi_packed.bin (embedded by the numerics package) is regenerated by cmd/genpi via the Chudnovsky algorithm, ~80s. The file is committed and the build/release path now uses it as-is instead of paying that ~80s on the critical path (see .goreleaser.yml and the docs job above). This job keeps the committed file honest by regenerating it and failing on drift, running in parallel with everything else so its cost is off the critical path. It needs only Go: genpi is a standalone program, no wasm/rust/terraform.
  pi-drift:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
          cache: true
      - name: Regenerate pi_packed.bin and fail on drift
        run: |
          go generate ./internal/provider/numerics/...
          if ! git diff --quiet -- internal/provider/numerics/pi_packed.bin; then
            echo "::error::pi_packed.bin is out of sync with cmd/genpi. Run 'go generate ./internal/provider/numerics/...' and commit the result."
            git diff -- internal/provider/numerics/pi_packed.bin
            exit 1
          fi
