name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

# Two parallel jobs so total wall time stays under ~3 minutes:
#   - test:     build, vet, the full test suite, coverage.
#   - generate: regenerate docs/ and pi_packed.bin, fail if either drifts.
# The Chudnovsky regen for pi_packed.bin takes ~80s on Actions runners — splitting
# it off keeps the test feedback loop snappy.
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      # `-coverpkg=./internal/...` captures cross-package coverage. The acceptance tests live in package provider but exercise package dataformat and package network through the protocol layer; without -coverpkg, that work doesn't count toward those packages and the per-package numbers look much worse than they actually are. We then write all per-package profiles into one merged file and report a single combined coverage figure, which is the number worth tracking.
      - run: go test ./... -count=1 -coverpkg=./internal/... -coverprofile=coverage.out -v
      - name: Combined coverage across all internal packages
        run: go tool cover -func=coverage.out | tail -1

  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true
      - run: go mod download
      # Guard: generated artifacts must be up-to-date with their sources. Three
      # things get regenerated by `go generate ./...`:
      #   - templates/functions/ from each package's Functions() registry (via cmd/gendoctemplates;
      #     bakes the family-specific `subcategory:` into per-function templates so tfplugindocs
      #     reads them as input).
      #   - docs/ from each function's MarkdownDescription / Summary / parameter docs (via tfplugindocs;
      #     consumes templates/functions/).
      #   - internal/provider/numerics/pi_packed.bin from cmd/genpi (Chudnovsky binary-splitting on
      #     ⌊π × 10⁶⌋ = 3,141,592 digits; ~75s on Actions runners)
      # If a contributor edited a function's metadata, registered a new function, or changed the
      # digit-count knob in cmd/genpi/main.go without running `go generate ./...`, this step fails
      # with the diff so the PR can be told to regenerate.
      - name: Verify generated artifacts are up to date
        run: |
          go generate ./...
          if ! git diff --quiet -- templates/functions/ docs/ internal/provider/numerics/pi_packed.bin; then
            echo "::error::Generated artifacts are out of sync with source. Run 'go generate ./...' and commit the result."
            git diff -- templates/functions/ docs/ internal/provider/numerics/pi_packed.bin
            exit 1
          fi
