name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

# Two parallel jobs:
#   - test:     build, vet, the full -race -count=1 TF_ACC=1 acceptance suite, coverage.
#   - generate: regenerate docs/ and pi_packed.bin, fail if either drifts.
# The Chudnovsky regen for pi_packed.bin takes ~80s on Actions runners — splitting it off keeps the generate-drift feedback loop separate from the slower acceptance pass.
# The test job's 15-minute timeout is a generous ceiling: locally the race-enabled acceptance suite runs in ~110 seconds, but Actions runners are roughly 2–3× slower for race-detector workloads, and the suite walks the framework protocol per-test. Don't tighten without re-measuring on a runner.
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      # `-coverpkg=./internal/...` captures cross-package coverage. The acceptance tests live in package provider but exercise package dataformat and package network through the protocol layer; without -coverpkg, that work doesn't count toward those packages and the per-package numbers look much worse than they actually are. We then write all per-package profiles into one merged file and report a single combined coverage figure, which is the number worth tracking.
      # `TF_ACC=1` opts in to running the `TestAcc_*` acceptance tests (terraform-plugin-testing skips them by default — without this every TestAcc_* call is a no-op). `-race` catches data-race regressions in the few places we hold shared state across goroutines (slugify's mutex around gosimple/slug's package globals is the load-bearing example); cheap insurance even though most of the code is pure functions.
      - run: go test ./... -count=1 -race -coverpkg=./internal/... -coverprofile=coverage.out -v
        env:
          TF_ACC: "1"
      - name: Combined coverage across all internal packages
        run: go tool cover -func=coverage.out | tail -1

  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true
      - run: go mod download
      # Guard: generated artifacts must be up-to-date with their sources. Two things get regenerated by `go generate ./...`:
      #   - docs/ from each function's MarkdownDescription / Summary / parameter docs (via tfplugindocs, reading per-function templates that cmd/gendoctemplates writes with the right `subcategory:` based on which package's Functions() registers each function; the templates themselves are gitignored).
      #   - internal/provider/numerics/pi_packed.bin from cmd/genpi (Chudnovsky binary-splitting on ⌊π × 10⁶⌋ = 3,141,592 digits; ~75s on Actions runners).
      # If a contributor edited a function's metadata, registered a new function in a different family, or changed the digit-count knob in cmd/genpi/main.go without running `go generate ./...`, this step fails with the diff so the PR can be told to regenerate.
      - name: Verify generated artifacts are up to date
        run: |
          go generate ./...
          if ! git diff --quiet -- docs/ internal/provider/numerics/pi_packed.bin; then
            echo "::error::Generated artifacts are out of sync with source. Run 'go generate ./...' and commit the result."
            git diff -- docs/ internal/provider/numerics/pi_packed.bin
            exit 1
          fi
