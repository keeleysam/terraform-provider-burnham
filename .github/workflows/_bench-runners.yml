name: Bench Runners

# THROWAWAY: A/B times the full-matrix release build on ubuntu-latest vs macos-latest to decide whether to
# move releases to Apple Silicon. Delete this file once the numbers are recorded. Runs only on the caching branch.
on:
  push:
    branches: [feat/release-caching]

permissions:
  contents: read

jobs:
  bench:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
          cache: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      # No rust-cache: measure the cold worst case so both runners are compared on equal footing (cargo generate + full go cross-compile). `build --snapshot --clean` runs the real before hooks (wasm engines via cargo) then compiles every matrix target, i.e. the exact release build path minus signing and publishing. goreleaser prints per-phase timestamps we can read from the log afterward.
      - uses: goreleaser/goreleaser-action@v7
        with:
          args: build --snapshot --clean
