name: Release

on:
  push:
    tags:
      - "v*"

# Goreleaser requires contents:write to create GitHub releases.
# To enable GPG signing for the Terraform registry, you'll also need to:
# 1. Generate a GPG key pair
# 2. Add GPG_PRIVATE_KEY and GPG_FINGERPRINT as repository secrets
# 3. Uncomment the "Import GPG key" step and the signs block in .goreleaser.yml
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true
      # - name: Import GPG key
      #   uses: crazy-max/ghaction-import-gpg@v6
      #   id: import_gpg
      #   with:
      #     gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
      #     passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - uses: goreleaser/goreleaser-action@v6
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
