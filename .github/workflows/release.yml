name: Release

on:
  push:
    tags:
      - "v*"

# Goreleaser requires contents:write to create GitHub releases.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
          cache: true
      # The WASM function families (image/resvg, regex) go:embed a wasm blob that is gitignored and built from Rust by the goreleaser `before` hook (`go generate ./internal/provider/...`). goreleaser cannot build the provider until that blob exists, so the toolchain and the wasm32-wasip1 target have to be present before goreleaser runs. No rust-cache here: releases are infrequent tag pushes, so a cold cargo build is fine and we avoid coupling to per-family workspace paths.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
