name: Release

on:
  push:
    tags:
      - "v*"

# Goreleaser requires contents:write to create GitHub releases.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
          cache: true
      # The WASM function families (regex, image/resvg, documents/typst) go:embed a wasm blob that is gitignored and built from Rust by the goreleaser `before` hook (`go generate ./internal/provider/...`). goreleaser cannot build the provider until that blob exists, so the toolchain and the wasm32-wasip1 target have to be present before goreleaser runs.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      # A cold cargo build of the three wasm engines is the ~5min long pole of a release. test.yml builds the same three crates on every push to main with rust-cache under the shared-key "wasm", and GitHub makes default-branch caches readable from tag-triggered runs, so this restores those warm target/ dirs and the goreleaser `before` hook's `cargo build --locked` becomes a no-op fingerprint check whenever the Rust source has not changed. save-if is false because this workflow only runs on tags: tag-scoped caches are not readable by the next tag, so saving here would just churn the 10GB quota for no benefit. main is the sole writer, this is a pure consumer. The workspace list and shared-key MUST stay in sync with test.yml or the keys stop matching and every release falls back to a cold build.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            internal/provider/regex/rust
            internal/provider/image/resvg/rust
            internal/provider/documents/typst/rust
          shared-key: wasm
          save-if: false
      # Cache the pinned Noto fonts (gitignored, downloaded by genfonts in the goreleaser before hook). genfonts is idempotent (skips the download when the on-disk files match the pinned sha256), so a cache hit avoids the network. Keyed on genfonts.go so a font bump re-downloads.
      - uses: actions/cache@v4
        with:
          path: internal/provider/image/fonts
          key: fonts-${{ runner.os }}-${{ hashFiles('internal/provider/image/genfonts.go') }}
      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
      # The Terraform Registry is supposed to ingest each new version automatically via a webhook it installs on the repo, but that webhook is never reliably created, so released versions silently never appear until someone clicks "Resync" in the app.terraform.io UI. This step fires that same resync from CI: it POSTs to the (undocumented) endpoint the UI uses, which accepts a standard HCP Terraform API token via Bearer (no cookie/CSRF), is idempotent, and returns 200 whether or not there was anything to sync.
      # The step works in three stages. First, if the version is already on the public registry (a webhook that happened to fire, or an earlier run/sync already ingested it) there is nothing to do. Second, wait for the GitHub release to be visible via the same GitHub API the registry scans: resyncing before the release is published just returns an empty scan, which is exactly the race that left v0.1.60 unpublished when this fired ~1s after goreleaser. Third, fire the resync and confirm the version went live, retrying because the registry's view of GitHub's releases can still lag by a few seconds even once GitHub itself reports the release.
      # The POST is synchronous: the server holds the connection open while it ingests, so a single request can run for tens of seconds (observed ~47s when the UI backfilled four missing versions at once). --max-time bounds each attempt so a genuine stall fails the job instead of hanging.
      - name: Resync Terraform Registry
        env:
          TF_REGISTRY_TOKEN: ${{ secrets.TF_REGISTRY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          resync_url="https://app.terraform.io/api/v2/organizations/keeleysam/registry/providers/keeleysam/burnham/resync"
          version_url="https://registry.terraform.io/v3/providers/keeleysam/burnham/versions/${version}"
          release_url="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/tags/${GITHUB_REF_NAME}"

          # Stage 1: skip everything if the version is already published.
          if [ "$(curl -sS -o /dev/null -w '%{http_code}' "${version_url}")" = "200" ]; then
            echo "Version ${version} is already live on registry.terraform.io; nothing to do"
            exit 0
          fi

          # Stage 2: wait for the GitHub release to be visible before asking the registry to scan for it.
          echo "Waiting for GitHub release ${GITHUB_REF_NAME} to be visible"
          release_visible=false
          for attempt in $(seq 1 12); do
            code=$(curl -sS -o /dev/null -w '%{http_code}' \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "${release_url}")
            if [ "${code}" = "200" ]; then
              echo "GitHub release ${GITHUB_REF_NAME} is visible"
              release_visible=true
              break
            fi
            echo "Attempt ${attempt}/12: GitHub release not visible yet (HTTP ${code}); retrying in 10s"
            sleep 10
          done
          if [ "${release_visible}" != "true" ]; then
            echo "::error::GitHub release ${GITHUB_REF_NAME} never became visible"
            exit 1
          fi

          # Stage 3: resync until the version lands on the registry, re-checking first so we never sync something already there.
          echo "Publishing version ${version} to the Terraform Registry"
          for attempt in $(seq 1 12); do
            if [ "$(curl -sS -o /dev/null -w '%{http_code}' "${version_url}")" = "200" ]; then
              echo "Version ${version} is live on registry.terraform.io"
              exit 0
            fi
            echo "Attempt ${attempt}/12: version ${version} not live yet; requesting resync"
            resync=$(curl -sS -w $'\n%{http_code}' -X POST --connect-timeout 30 --max-time 300 \
              -H "Authorization: Bearer ${TF_REGISTRY_TOKEN}" \
              -H "Content-Type: application/vnd.api+json" \
              "${resync_url}") || echo "resync request errored (will retry)"
            echo "Resync response: ${resync}"
            sleep 15
          done
          echo "::error::Version ${version} did not appear on the registry within the timeout"
          exit 1
