name: Auto Pre-Release

on:
  push:
    branches: [main]

permissions:
  contents: write

# Serialize releases. Without this, two merges to main close together spawn two runs that both read
# the same latest tag, compute the same next version, and race to push it (one fails, or a release is
# skipped). cancel-in-progress: false queues instead of cancelling, so each run's checkout (fetch all
# tags) sees the tag the previous run pushed and computes the next one correctly.
concurrency:
  group: auto-release
  cancel-in-progress: false

jobs:
  auto-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.DEPENDABOT_PAT }}
      - name: Get next tag
        id: version
        run: |
          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            echo "new_tag=v0.1.0" >> "$GITHUB_OUTPUT"
          else
            IFS='.' read -r major minor patch <<< "${latest#v}"
            echo "new_tag=v${major}.${minor}.$((patch + 1))" >> "$GITHUB_OUTPUT"
          fi
      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.new_tag }}"
          git push origin "${{ steps.version.outputs.new_tag }}"
